openapi: 3.0.3
info:
  title: Temizİz API
  version: 1.0.0
  description: >
    Doğayı Koru, İzini Temiz Bırak! Bu API, Temizİz platformunun kullanıcı yönetimi, 
    kirli alan bildirimleri, temizlik görevleri, liderlik tablosu ve topluluk yorumlarını yönetmesi için tasarlanmış RESTful bir servistir.
  contact:
    name: Ahmet Kağan Karababa
    email: ahmetkagankarababa@outlook.com

servers:
  - url: https://api.temiziz.com/v1
    description: Üretim sunucusu (Production)
  - url: http://localhost:3000/v1
    description: Yerel geliştirme sunucusu (Development)

tags:
  - name: Kimlik ve Profil
    description: Kullanıcı kayıt, profil görüntüleme ve hesap işlemleri
  - name: Kirli Alan Bildirimleri
    description: Doğadaki kirli alanların bildirilmesi, düzenlenmesi ve silinmesi
  - name: Temizlik ve Görevler
    description: Temizlenen alanların kanıtları, görev durumları ve puanlama
  - name: Topluluk
    description: Yorumlar, gönderi/yorum beğenileri, liderlik tablosu

security:
  - BearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Kimlik ve Profil
      summary: Kullanıcı Kayıt Olma
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu

  /auth/login:
    post:
      tags:
        - Kimlik ve Profil
      summary: Kullanıcı Giriş Yapma
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Giriş başarılı, token döndü

  /profile:
    get:
      tags:
        - Kimlik ve Profil
      summary: Profil Bilgilerini Görüntüleme
      operationId: getProfile
      responses:
        "200":
          description: Profil bilgileri başarıyla getirildi
    put:
      tags:
        - Kimlik ve Profil
      summary: Profil Bilgilerini Güncelleme / Avatar Seçme
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                profilePhoto:
                  type: string
      responses:
        "200":
          description: Profil başarıyla güncellendi
    delete:
      tags:
        - Kimlik ve Profil
      summary: Hesap Silme
      operationId: deleteProfile
      responses:
        "204":
          description: Hesap başarıyla silindi

  /users/{id}:
    get:
      tags:
        - Kimlik ve Profil
      summary: Diğer Kullanıcıların Profilini Görüntüleme
      operationId: getUserProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Kullanıcı profili

  /users/{id}/posts:
    get:
      tags:
        - Kirli Alan Bildirimleri
      summary: Kullanıcının Gönderilerini Görüntüleme
      operationId: getUserPosts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Kullanıcının paylaşımları

  /pollution-reports:
    get:
      tags:
        - Kirli Alan Bildirimleri
      summary: Kirli Alanları Listeleme
      operationId: getPollutionReports
      security: []
      responses:
        "200":
          description: Tüm gönderiler
    post:
      tags:
        - Kirli Alan Bildirimleri
      summary: Kirli Alan Bildirme
      operationId: createPollutionReport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                description:
                  type: string
                locationName:
                  type: string
      responses:
        "201":
          description: Gönderi eklendi

  /pollution-reports/{id}:
    put:
      tags:
        - Kirli Alan Bildirimleri
      summary: Bildirilen Alanı (Gönderiyi) Güncelleme
      operationId: updatePollutionReport
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                description:
                  type: string
                locationName:
                  type: string
      responses:
        "200":
          description: Gönderi güncellendi
    delete:
      tags:
        - Kirli Alan Bildirimleri
      summary: Gönderi Silme
      operationId: deletePollutionReport
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Gönderi kalıcı olarak silindi

  /clean-reports:
    post:
      tags:
        - Temizlik ve Görevler
      summary: Temizlik Fotoğrafı Yükleme
      operationId: createCleanReport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                pollutionReportId:
                  type: string
      responses:
        "201":
          description: Temizlik fotoğrafı yüklendi

  /posts/{id}/like:
    post:
      tags:
        - Topluluk
      summary: Gönderiyi Beğenme
      operationId: likePost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Beğenildi
    delete:
      tags:
        - Topluluk
      summary: Beğeniyi Geri Çekme
      operationId: unlikePost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Beğeni kaldırıldı

  /leaderboard:
    get:
      tags:
        - Topluluk
      summary: Liderlik Tablosunu Listeleme
      operationId: getLeaderboard
      security: []
      responses:
        "200":
          description: En çok beğeni toplayan kullanıcılar sıralandı

  /comments:
    post:
      tags:
        - Topluluk
      summary: Temizlenen Alana (veya mevcut yoruma) Yorum Yapma
      operationId: addComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                postId:
                  type: string
                text:
                  type: string
                parentId:
                  type: string
                  description: "Eğer bir yoruma yanıt veriliyorsa, yanıtlanan yorumun ID'si"
      responses:
        "201":
          description: Yorum başarıyla eklendi

  /comments/{taskId}:
    get:
      tags:
        - Topluluk
      summary: Yorumları Listeleme
      operationId: getCommentsByTask
      security: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: İlgili postun tüm yorumları

  /comments/{id}:
    delete:
      tags:
        - Topluluk
      summary: Uygunsuz Yorumu Silme
      operationId: deleteComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Yorum silindi

  /comments/{id}/like:
    post:
      tags:
        - Topluluk
      summary: Yorumu Beğenme
      operationId: likeComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Yorum beğenildi
    delete:
      tags:
        - Topluluk
      summary: Yorum Beğenisini Geri Çekme
      operationId: unlikeComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Beğeni geri çekildi
          
  /reports/abuse:
    post:
      tags:
        - Topluluk
      summary: Uygunsuz İçeriği Şikayet Etme
      operationId: reportAbuse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetId:
                  type: string
                reason:
                  type: string
      responses:
        "201":
          description: Şikayet iletildi

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'JWT tabanlı kimlik doğrulama. İstek başlığına "Bearer <token>" eklenmeli.'

  schemas:
    RegisterInput:
      type: object
      required:
        - fullName
        - email
        - password
      properties:
        fullName:
          type: string
        email:
          type: string
        password:
          type: string